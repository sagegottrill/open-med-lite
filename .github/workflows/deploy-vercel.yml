# Deploys production on every push to main via Vercel CLI.
# Use this when the Vercel ↔ GitHub integration does not trigger builds.
#
# Required GitHub repo secrets (Vercel → Project → Settings → General):
#   VERCEL_TOKEN          — create at https://vercel.com/account/tokens
#   VERCEL_ORG_ID         — Team / Personal ID (same page as below)
#   VERCEL_PROJECT_ID     — Project → Settings → General → Project ID
#
# If native Git deployments also work, either disable "Automatic deployments"
# in Vercel Git settings for this project or remove this workflow to avoid
# duplicate production deploys.

name: Deploy to Vercel (production)

on:
  push:
    branches: [main]

concurrency:
  group: vercel-prod-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
